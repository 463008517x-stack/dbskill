name: A股早报自动广播站

on:
  schedule:
    - cron: '30 1 * * 1-5' # 北京时间每周一至周五 09:30
  workflow_dispatch: 

jobs:
  run-daily-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        
      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: pip install requests python-dotenv feedparser openai 
        
      - name: 执行自动化脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python cls_news_analyzer.py